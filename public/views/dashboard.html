<!-- views/dashboard.html -->
<nav class="navbar">
    <div class="logo">bizzaOS</div>
    <div class="view">:&nbsp;
        <div class="name">dashboard</div>
    </div>
</nav>
<div class="layout">
    <aside class="aside">
        <details name="files">
            <summary class="item">Files</summary>
            <div class="content">
                <button class="button1" command="show-modal" commandfor="files-dialog">Files</button>
            </div>
        </details>
        <details name="settings">
            <summary class="item">Settings</summary>
            <div class="content">
                <button class="button2" command="show-modal" commandfor="settings-dialog">
                    <i class="bi bi-gear"></i>Settings
                </button>
            </div>
        </details>
    </aside>
    <main class="main">
        <div class="dashboard toolbar">
            <div class="label">Apps</div>
            <div class="tools">
                <label class="reorder-toggle">
                    <input type="checkbox" id="reorderApps">
                    <i class="bi bi-grid-3x2"></i>
                    <i class="bi bi-grid-3x2-gap"></i>
                </label>
            </div>
        </div>
        <ul class="apps">
            <li class="app card system hidden" id="terminal">
                <div class="icon"><i class="bi bi-terminal-fill"></i></div>
                <div class="label">terminal</div>
            </li>
            <li class="app card system" id="appsManager">
                <div class="icon"><i class="bi bi-grid-1x2-fill"></i></div>
                <div class="label">apps</div>
            </li>
            <li class="app card system" id="filesManager">
                <div class="icon"><i class="bi bi-collection-fill"></i></i></div>
                <div class="label">files</div>
            </li>
            <li class="app card">
                <div class="options">
                    <i class="bi bi-grip-horizontal"></i>
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
                <div class="icon"><i class="bi bi-box-fill"></i></i></div>
                <div class="label">app1</div>
            </li>
            <li class="app card">
                <div class="options">
                    <i class="bi bi-grip-horizontal"></i>
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
                <div class="icon"><i class="bi bi-box-fill"></i></i></div>
                <div class="label">app2</div>
            </li>
            <li class="app card">
                <div class="options">
                    <i class="bi bi-grip-horizontal"></i>
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
                <div class="icon"><i class="bi bi-box-fill"></i></i></div>
                <div class="label">app3</div>
            </li>
        </ul>
    </main>
</div>
<dialog id="app-dialog">
    <div id="dialog-root"></div>
</dialog>
